<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vesper</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="glow_soft">

<div id="ambient-orb"></div>

<aside>
  <div class="sidebar-logo">
    <svg width="18" height="18" viewBox="0 0 100 100" style="overflow:visible;flex-shrink:0"><path fill="currentColor" d="M 18 50 C 18 22, 32 12, 50 12 C 68 12, 82 22, 82 50 Z"/><path fill="currentColor" d="M 18 50 Q 27 60, 36 50 Q 45 61, 50 50 Q 55 61, 64 50 Q 73 60, 82 50 Z"/></svg>
    Vesper
  </div>
  <button class="new-chat-btn" id="newChatBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    New chat
  </button>
  <ul class="chat-list" id="chatList"></ul>
</aside>

<div class="top-nav">
  <div>
    <select class="model-selector" id="modelSelector">
      <option value="vesper-base">Vesper Base v1</option>
      <option value="vesper-pro" disabled>Vesper Pro (Coming Soon)</option>
    </select>
  </div>
  <div class="user-menu">
    <div id="g_id_onload" data-client_id="{{ client_id }}" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-theme="filled_black" id="headerSignin"></div>
    
    <img id="profilePic" class="profile-pic" alt="Profile" onclick="document.getElementById('userDropdown').classList.toggle('show')">
    <div class="dropdown-menu" id="userDropdown">
      <button onclick="document.getElementById('settingsModal').classList.add('show'); document.getElementById('userDropdown').classList.remove('show');">⚙️ Settings</button>
      <button onclick="App.logout()">🚪 Logout</button>
    </div>
  </div>
</div>

<main>
  <div class="home-view" id="homeView">
    <div class="greeting">
      <div id="bigVesper" class="vesper-avatar"></div>
      <span id="greetingText">Good evening, Friend</span>
    </div>
  </div>

  <div class="chat-view" id="chatView">
    <div class="chat-inner" id="chatInner"></div>
  </div>

  <div class="input-wrapper">
    <div class="input-box">
      <textarea id="userInput" placeholder="Talk to Vesper..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" title="Send"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
      <button class="stop-btn" id="stopBtn" style="display: none;" title="Stop"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg></button>
    </div>
  </div>
</main>

<div class="settings-modal" id="settingsModal">
  <div class="settings-content">
    <h2>Settings</h2>
    <p style="color: #888; margin-bottom: 20px;">Vesper configuration goes here.</p>
    <button onclick="document.getElementById('settingsModal').classList.remove('show')" style="padding: 8px 16px; background: white; color: black; border: none; border-radius: 4px; cursor: pointer;">Close</button>
  </div>
</div>

<script>
  window.SERVER_USER_NAME = "{{ user_name or '' }}";
  window.SERVER_USER_PICTURE = "{{ user_picture or '' }}";
  window.INITIAL_CHAT_ID = "{{ initial_chat_id or '' }}";
</script>
<script src="/static/js/api.js"></script>
<script src="/static/js/vesper.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
