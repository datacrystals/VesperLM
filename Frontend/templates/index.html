<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vesper</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg-main: #0e1018;
      --bg-sidebar: #090b10;
      --text-main: #dde2ec;
      --text-muted: #6b7280;
      --border-color: #1e2235;
      --input-bg: #151825;
      --user-bubble: #1e2436;
      --vesper-base: #7dd3fc;
      --vesper-glow: rgba(125, 211, 252, 0.18);
      --sidebar-w: 260px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background-color 2s ease;
    }

    /* ── AMBIENT ── */
    #ambient-orb {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      filter: blur(180px);
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%);
      transition: background-color 2.5s ease, top 0.6s ease-out, left 0.6s ease-out;
      opacity: 0.12;
      background-color: transparent;
    }

    /* ── SIDEBAR ── */
    aside {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background-color: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      padding: 16px 8px;
      z-index: 10;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px 18px;
      color: var(--vesper-base);
      font-family: ui-serif, Georgia, serif;
      font-size: 1.1em;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 10px;
      transition: color 2s ease;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85em;
      font-family: inherit;
      text-align: left;
      margin: 0 4px 4px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .new-chat-btn:hover {
      background: rgba(255,255,255,0.04);
      color: var(--text-main);
      border-color: rgba(255,255,255,0.1);
    }

    .sidebar-section-title {
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin: 18px 0 8px 16px;
    }

    .chat-list { flex: 1; overflow-y: auto; list-style: none; }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

    .chat-item {
      padding: 9px 14px;
      margin: 1px 4px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.83em;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s, color 0.15s;
    }
    .chat-item:hover { background: rgba(255,255,255,0.04); color: var(--text-main); }
    .chat-item.active { background: rgba(125,211,252,0.08); color: var(--vesper-base); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      z-index: 5;
    }

    /* CHAT HEADER */
    .chat-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(14,16,24,0.85);
      backdrop-filter: blur(12px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .chat-header.visible { opacity: 1; pointer-events: auto; }
    .chat-header-title {
      font-family: ui-serif, Georgia, serif;
      font-size: 0.95em;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* HOME VIEW */
    .home-view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.4s ease;
      padding-bottom: 120px;
    }
    .home-view.hidden { opacity: 0; pointer-events: none; }

    .greeting {
      font-family: ui-serif, Georgia, serif;
      font-size: 2em;
      color: #d6dae8;
      font-weight: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      font-style: italic;
    }

    /* CHAT VIEW */
    .chat-view {
      position: absolute;
      inset: 54px 0 0 0;
      overflow-y: auto;
      padding: 30px 0 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      scroll-behavior: smooth;
    }
    .chat-view::-webkit-scrollbar { width: 4px; }
    .chat-view::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    .chat-view.active { opacity: 1; pointer-events: auto; }

    .chat-inner { width: 100%; max-width: 760px; padding: 0 20px; display: flex; flex-direction: column; gap: 28px; }

    /* MESSAGES */
    .message-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .message-row.user { justify-content: flex-end; }

    .message-container {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 82%;
    }

    .message-bubble {
      padding: 12px 18px;
      line-height: 1.65;
      font-size: 0.93em;
      border-radius: 14px;
      white-space: pre-wrap;
    }
    .message-row.user .message-bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .message-row.assistant .message-bubble {
      background: transparent;
      padding: 10px 0;
    }

    /* THINKING DROPDOWN */
    .vesper-thoughts {
      margin-bottom: 10px;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      width: fit-content;
      min-width: 260px;
      max-width: 100%;
    }
    .vesper-thoughts summary {
      padding: 9px 14px;
      font-size: 0.82em;
      color: var(--text-muted);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      transition: color 0.2s;
    }
    .vesper-thoughts summary:hover { color: var(--vesper-base); }
    .vesper-thoughts summary::-webkit-details-marker { display: none; }
    .thought-inner {
      padding: 10px 14px 14px;
      font-size: 0.83em;
      color: #6b7a99;
      font-style: italic;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    /* EDIT */
    .edit-btn {
      opacity: 0;
      transition: opacity 0.2s;
      background: none; border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.78em;
      align-self: flex-end;
      padding: 2px 6px;
    }
    .message-row.user:hover .edit-btn { opacity: 1; }
    .edit-btn:hover { color: var(--text-main); }
    .edit-input-box { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .edit-input-box textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
      outline: none;
      font-size: 0.93em;
    }
    .edit-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .btn-cancel, .btn-save {
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-size: 0.83em;
      font-family: inherit;
      font-weight: 500;
    }
    .btn-cancel { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }
    .btn-save { background: var(--vesper-base); color: #000; transition: background 2s ease; }

    /* ── INPUT BOX ── */
    .input-wrapper {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      padding: 20px 20px 28px;
      background: linear-gradient(to top, var(--bg-main) 60%, transparent);
      z-index: 20;
      pointer-events: none;
    }
    .input-box {
      width: 100%;
      max-width: 700px;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      pointer-events: auto;
      transition: border-color 0.3s;
    }
    .input-box:focus-within { border-color: rgba(125,211,252,0.25); }
    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 1em;
      font-family: inherit;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
      height: 24px;
    }
    .send-btn {
      background: var(--vesper-base);
      color: #0a0c14;
      border: none;
      border-radius: 10px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s, background 2s ease, opacity 0.2s;
    }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── VESPER SVG ── */
    .vesper-avatar {
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: flex-start;
      z-index: 3;
      pointer-events: none;
      width: 52px; height: 52px;
    }
    .greeting .vesper-avatar { width: 160px; height: 160px; }

    .vesper-avatar::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 150%; height: 150%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--vesper-base) 0%, transparent 65%);
      opacity: 0.2;
      z-index: -1;
      pointer-events: none;
      transition: background 2s ease, opacity 1s ease;
    }
    .vesper-svg {
      overflow: visible;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .v-body { fill: var(--vesper-base); transition: fill 2s ease; }
    .v-tentacle { stroke: var(--vesper-base); fill: none; stroke-linecap: round; transition: stroke 2s ease; }
    .v-highlight { fill: rgba(255,255,255,0.18); }
    .v-cheek { fill: #f472b6; opacity: 0.65; transition: opacity 0.5s; }
    .v-eye { fill: #0a0c14; }
    .v-pupil { fill: #fff; }
    .v-mouth { stroke: #0a0c14; fill: none; stroke-linecap: round; }

    @keyframes bob {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-4px) rotate(0.4deg); }
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.08); }
    }
    @keyframes antennaWobble {
      0%, 100% { transform: rotate(0deg); transform-origin: 50px 10px; }
      30% { transform: rotate(4deg); transform-origin: 50px 10px; }
      70% { transform: rotate(-3deg); transform-origin: 50px 10px; }
    }
    .vesper-svg { animation: bob 7s ease-in-out infinite; }
    .v-eye-group { animation: blink 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .v-antenna { animation: antennaWobble 4s ease-in-out infinite; }

    /* MOODS */
    body.glow_soft   { --vesper-base: #7dd3fc; } body.glow_soft   #ambient-orb { background-color: #0ea5e9; }
    body.glow_bright { --vesper-base: #fde047; } body.glow_bright #ambient-orb { background-color: #eab308; }
    body.glow_green  { --vesper-base: #4ade80; } body.glow_green  #ambient-orb { background-color: #22c55e; }
    body.pulse_fast  { --vesper-base: #fb923c; } body.pulse_fast  #ambient-orb { background-color: #ea580c; }
    body.fade        { --vesper-base: #64748b; } body.fade        #ambient-orb { background-color: #334155; opacity: 0.05; }
    body.glow_warm   { --vesper-base: #f472b6; } body.glow_warm   #ambient-orb { background-color: #db2777; }
    body.ripple      { --vesper-base: #c084fc; } body.ripple      #ambient-orb { background-color: #9333ea; }
    body.dim         { --vesper-base: #475569; } body.dim         #ambient-orb { background-color: #0f172a; }
    body.sparkle     { --vesper-base: #ffffff; } body.sparkle     #ambient-orb { background-color: #fef08a; }
    body.flicker     { --vesper-base: #a78bfa; } body.flicker     #ambient-orb { background-color: #7c3aed; }

    body.glow_bright .vesper-svg { animation: bob 3.5s ease-in-out infinite; }
    body.fade .vesper-svg { animation: bob 10s ease-in-out infinite; filter: grayscale(50%); }
    body.sparkle .vesper-svg { filter: drop-shadow(0 0 8px #fef08a); }
    body.sparkle .vesper-avatar::before { opacity: 0.45; }

    @keyframes flickerAnim { 0%,100% { opacity:1; } 48% { opacity:0.5; } 52% { opacity:1; } 55% { opacity:0.7; } }
    body.flicker .vesper-svg { animation: bob 7s ease-in-out infinite, flickerAnim 0.8s infinite; }

    /* TOP-RIGHT auth — inside chat header */
    .chat-header { justify-content: space-between; }
    .g_id_signin { transform: scale(0.85); transform-origin: right center; }
  </style>
</head>
<body class="glow_soft">

<div id="ambient-orb"></div>

<aside>
  <div class="sidebar-logo">
    <svg width="18" height="18" viewBox="0 0 100 100" style="overflow:visible;flex-shrink:0">
      <path fill="currentColor" d="M 18 50 C 18 22, 32 12, 50 12 C 68 12, 82 22, 82 50 Z"/>
      <path fill="currentColor" d="M 18 50 Q 27 60, 36 50 Q 45 61, 50 50 Q 55 61, 64 50 Q 73 60, 82 50 Z"/>
    </svg>
    Vesper
  </div>
  <button class="new-chat-btn" onclick="startNewChat()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    New chat
  </button>
  <div class="sidebar-section-title">Recent</div>
  <ul class="chat-list" id="chatList"></ul>
</aside>

<main>
  <!-- CHAT HEADER (shown when in a chat) -->
  <div class="chat-header" id="chatHeader">
    <span class="chat-header-title" id="chatHeaderTitle">Chat with Vesper</span>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
      <div class="g_id_signin" data-type="standard" data-theme="filled_black"></div>
    </div>
  </div>

  <!-- HOME -->
  <div class="home-view" id="homeView">
    <div style="position:absolute;top:16px;right:18px;z-index:20">
      <div class="g_id_signin" data-type="standard" data-theme="filled_black" id="homeSignin"></div>
    </div>
    <div class="greeting">
      <div id="bigVesper" class="vesper-avatar"></div>
      <span id="greetingText">Good evening, Friend</span>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-view" id="chatView">
    <div class="chat-inner" id="chatInner"></div>
  </div>

  <!-- INPUT (always at bottom, always same size) -->
  <div class="input-wrapper">
    <div class="input-box">
      <textarea id="userInput" placeholder="Talk to Vesper..." rows="1" onkeydown="handleEnter(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="submitMessage()" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>
</main>

<script>
// ════════════════════════════════════════════
//  SINE-WAVE TENTACLE ENGINE
// ════════════════════════════════════════════
// Each tentacle is defined by its root X, thickness, opacity, and phase offset.
// Every animation frame we compute a multi-point path that follows a sine wave
// travelling downward — creating a natural, organic ripple.

const TENTACLE_DEFS = [
  { x: 32, w: 2.2, op: 0.70, phase: 0.0,  speed: 0.85, amp: 4.5 },
  { x: 40, w: 1.6, op: 0.45, phase: 1.1,  speed: 0.70, amp: 3.5 },
  { x: 50, w: 3.0, op: 0.88, phase: 0.55, speed: 0.95, amp: 5.0 },
  { x: 60, w: 1.6, op: 0.45, phase: 1.8,  speed: 0.78, amp: 3.5 },
  { x: 68, w: 2.2, op: 0.70, phase: 2.5,  speed: 0.90, amp: 4.5 },
];

// Build a sine-wave SVG path from root (x, y0) downward for `length` units.
// The wave travels down the tentacle: offset = phase + t*freq gives a traveling wave.
function sineWavePath(rootX, y0, length, time, phase, speed, amp) {
  const steps = 16;
  const freq = 2.2; // spatial frequency (cycles per unit length)
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const y = y0 + t * length;
    // Traveling sine wave — negative time makes wave travel upward (toward bell)
    const x = rootX + amp * Math.sin(freq * t * Math.PI - time * speed + phase);
    pts.push([x, y]);
  }
  // Build smooth cubic bezier through points using catmull-rom → bezier conversion
  if (pts.length < 2) return '';
  let d = `M ${pts[0][0].toFixed(2)} ${pts[0][1].toFixed(2)}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(pts.length - 1, i + 2)];
    const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
    const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
    const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
    const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
    d += ` C ${cp1x.toFixed(2)} ${cp1y.toFixed(2)}, ${cp2x.toFixed(2)} ${cp2y.toFixed(2)}, ${p2[0].toFixed(2)} ${p2[1].toFixed(2)}`;
  }
  return d;
}

// Animate all .v-tentacle elements in a given SVG
function animateTentacles(svgEl, time) {
  const paths = svgEl.querySelectorAll('.v-tentacle');
  paths.forEach((path, i) => {
    const def = TENTACLE_DEFS[i];
    if (!def) return;
    path.setAttribute('d', sineWavePath(def.x, 52, 68, time, def.phase, def.speed, def.amp));
  });
}

let rafTime = 0;
const allSVGs = new Set();

function animationLoop(ts) {
  rafTime = ts * 0.001; // seconds
  allSVGs.forEach(svg => {
    if (document.body.contains(svg)) {
      animateTentacles(svg, rafTime);
    } else {
      allSVGs.delete(svg);
    }
  });
  requestAnimationFrame(animationLoop);
}
requestAnimationFrame(animationLoop);

// ════════════════════════════════════════════
//  VESPER SVG TEMPLATE
// ════════════════════════════════════════════
function buildVesperSVG() {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('class', 'vesper-svg');
  svg.setAttribute('viewBox', '0 0 100 120');
  svg.setAttribute('xmlns', ns);

  svg.innerHTML = `
    <!-- Antenna -->
    <g class="v-antenna">
      <line x1="50" y1="10" x2="50" y2="4" stroke="var(--vesper-base)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <circle cx="50" cy="3" r="2" fill="var(--vesper-base)" opacity="0.85"/>
    </g>
    <!-- Bell (chubbier, rounder) -->
    <path class="v-body" d="M 14 52 C 12 22, 28 7, 50 7 C 72 7, 88 22, 86 52 Z"/>
    <!-- Bell underskirt with gentle scallop -->
    <path class="v-body" d="M 14 52 Q 23 65, 33 52 Q 41 66, 50 52 Q 59 66, 67 52 Q 77 65, 86 52 Z"/>
    <!-- Inner glow -->
    <path fill="rgba(255,255,255,0.07)" d="M 22 52 C 20 30, 32 14, 50 12 C 68 14, 80 30, 78 52 Z"/>
    <!-- Highlight sheen (bigger, rounder) -->
    <ellipse fill="rgba(255,255,255,0.22)" cx="36" cy="20" rx="9" ry="6" transform="rotate(-20 36 20)"/>
    <ellipse fill="rgba(255,255,255,0.10)" cx="58" cy="15" rx="5" ry="3.5" transform="rotate(-10 58 15)"/>
    <!-- Big blushy cheeks -->
    <ellipse class="v-cheek" cx="25" cy="46" rx="9" ry="5"/>
    <ellipse class="v-cheek" cx="75" cy="46" rx="9" ry="5"/>
    <!-- Eyes with blink group -->
    <g class="v-eye-group">
      <!-- Eyelash curves -->
      <path d="M 31 33 Q 37 30, 43 33" stroke="rgba(10,12,20,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M 57 33 Q 63 30, 69 33" stroke="rgba(10,12,20,0.5)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- Eyeballs -->
      <circle class="v-eye" cx="37" cy="38" r="7"/>
      <circle class="v-eye" cx="63" cy="38" r="7"/>
      <!-- Iris shimmer -->
      <circle fill="rgba(255,255,255,0.12)" cx="37" cy="38" r="5"/>

  allSVGs.add(svg);

}

let currentChatId = null;
let isTyping = false;
let userName = 'Friend';
let chatHistoryCache = [];
let currentChatTitle = '';
let thinkInterval = null;
const thinkingPhrases = [

// ── Init big Vesper ──

// ── Ambient orb tracking ──
function updateOrbPosition() {
  const orb = document.getElementById('ambient-orb');
  const homeHidden = document.getElementById('homeView').classList.contains('hidden');
  let target;
  if (homeHidden) {
    const avatars = document.querySelectorAll('#chatInner .vesper-avatar');
    target = avatars.length ? avatars[avatars.length - 1] : null;
  } else {
    target = bigVesperEl;
  }
  if (target) {
    const r = target.getBoundingClientRect();
    orb.style.top = (r.top + r.height / 2) + 'px';
    orb.style.left = (r.left + r.width / 2) + 'px';
  }
}
setInterval(updateOrbPosition, 120);

// ── Greeting ──
function updateGreeting() {
  const h = new Date().getHours();
  const t = h < 12 ? 'morning' : h < 18 ? 'afternoon' : 'evening';
  document.getElementById('greetingText').innerText = `Good ${t}, ${userName}`;
}
updateGreeting();

function handleCredentialResponse(response) {
  try {
    const p = JSON.parse(atob(response.credential.split('.')[1]));
    userName = p.given_name || p.name;
    updateGreeting();
    document.querySelector('.g_id_signin').style.display = 'none';
  } catch(e) {}
}

// ── Mood ──
function setMood(moodClass) {
  const valid = ['glow_soft','glow_bright','glow_green','flicker','pulse_fast','fade','glow_warm','ripple','dim','sparkle'];
  document.body.className = valid.includes(moodClass) ? moodClass : 'glow_soft';
}

// ── Auto-resize textarea ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ── Enter to send ──
function handleEnter(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitMessage();
  }
}

// ── Sidebar state ──
async function fetchChats() {
  try {
    const res = await fetch('/api/chats');
    const chats = await res.json();
    const list = document.getElementById('chatList');
    list.innerHTML = '';
    chats.forEach(chat => {
      const li = document.createElement('li');
      li.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
      li.textContent = chat.title;
      li.dataset.chatId = chat.id;
      li.onclick = () => loadChat(chat.id);
      list.appendChild(li);
    });
  } catch(e) {}
}

function updateSidebarActive() {
  document.querySelectorAll('.chat-item').forEach(li => {
    li.classList.toggle('active', li.dataset.chatId === currentChatId);
  });
}

// ── Show / hide chat mode ──
function enterChatMode(title) {
  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('chatView').classList.add('active');
  document.getElementById('chatHeader').classList.add('visible');
  document.getElementById('chatHeaderTitle').textContent = title || 'Chat with Vesper';
}

function exitChatMode() {
  document.getElementById('homeView').classList.remove('hidden');
  document.getElementById('chatView').classList.remove('active');
  document.getElementById('chatHeader').classList.remove('visible');
}

// ── New chat ──
function startNewChat() {
  currentChatId = null;
  currentChatTitle = '';
  chatHistoryCache = [];
  setMood('glow_soft');
  exitChatMode();
  document.getElementById('chatInner').innerHTML = '';
  document.getElementById('userInput').value = '';
  autoResize(document.getElementById('userInput'));
  updateSidebarActive();
}

// ── Load existing chat ──
async function loadChat(chatId) {
  currentChatId = chatId;
  const res = await fetch(`/api/chats/${chatId}`);
  const chat = await res.json();
  chatHistoryCache = chat.messages || [];
  currentChatTitle = chat.title || 'Chat with Vesper';
  enterChatMode(currentChatTitle);
  renderChatView();
  updateSidebarActive();
}

// ── Format text ──
function formatVesperHTML(rawText, label) {
  let html = rawText.replace(/\[~[a-z_]+~\]/g, '');
  html = html.replace(/<think>([\s\S]*?)<\/think>/gi,
    `<details class="vesper-thoughts"><summary>💭 ${label || "Vesper's thoughts"}</summary><div class="thought-inner">$1</div></details>`);
  if (html.includes('<think>') && !html.includes('</think>')) {
    html = html.replace(/<think>([\s\S]*)$/gi,
      `<details class="vesper-thoughts" open><summary>💭 ${label || "Vesper's thoughts"}</summary><div class="thought-inner">$1</div></details>`);
  }
  return html.trim();
}

// ── Render full chat ──
function renderChatView() {
  const inner = document.getElementById('chatInner');
  inner.innerHTML = '';
  let lastMood = 'glow_soft';
  chatHistoryCache.forEach((msg, index) => {
    const moodMatch = [...msg.content.matchAll(/\[~([a-z_]+)~\]/g)].pop();
    if (moodMatch) lastMood = moodMatch[1];
    appendMessageUI(msg.role, msg.content, index, "Vesper's thoughts");
  });
  setMood(lastMood);
  const cv = document.getElementById('chatView');
  cv.scrollTop = cv.scrollHeight;
}

// ── Append one message ──
function appendMessageUI(role, rawText, index, thinkLabel) {
  const inner = document.getElementById('chatInner');
  const row = document.createElement('div');
  row.className = `message-row ${role}`;
  row.id = `msg-row-${index}`;

  const container = document.createElement('div');
  container.className = 'message-container';

  if (role === 'assistant') {
    const av = document.createElement('div');
    av.className = 'vesper-avatar';
    av.appendChild(buildVesperSVG());
    row.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = formatVesperHTML(rawText, thinkLabel);
  container.appendChild(bubble);

  if (role === 'user') {
    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.innerHTML = '✎ Edit';
    editBtn.onclick = () => enableEditMode(index, rawText, container);
    container.appendChild(editBtn);
  }

  row.appendChild(container);
  inner.appendChild(row);
  return bubble;
}

// ── Edit mode ──
function enableEditMode(index, text, container) {
  container.innerHTML = `
    <div class="edit-input-box">
      <textarea id="edit-area-${index}">${text}</textarea>
      <div class="edit-actions">
        <button class="btn-cancel" onclick="renderChatView()">Cancel</button>
        <button class="btn-save" onclick="saveEdit(${index})">Save & Submit</button>
      </div>
    </div>`;
}

async function saveEdit(index) {
  const newText = document.getElementById(`edit-area-${index}`).value.trim();
  if (!newText) return;
  chatHistoryCache = chatHistoryCache.slice(0, index);
  renderChatView();
  await performChatRequest(newText, index);
}

// ── Submit ──
async function submitMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  autoResize(input);
  await performChatRequest(text, null);
}

// ── Core request ──
async function performChatRequest(text, editIndex) {
  if (isTyping) return;
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;

  // Switch to chat mode if not already
  if (!document.getElementById('chatView').classList.contains('active')) {
    enterChatMode(text.slice(0, 40) + (text.length > 40 ? '…' : ''));
  }

  const userIndex = chatHistoryCache.length;
  appendMessageUI('user', text, userIndex, null);
  chatHistoryCache.push({ role: 'user', content: text });

  const chatView = document.getElementById('chatView');
  const inner = document.getElementById('chatInner');

  // Assistant placeholder row
  const row = document.createElement('div');
  row.className = 'message-row assistant';
  const av = document.createElement('div');
  av.className = 'vesper-avatar';
  av.appendChild(buildVesperSVG());
  const container = document.createElement('div');
  container.className = 'message-container';
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = `<details class="vesper-thoughts" open><summary>${thinkingPhrases[0]}</summary></details>`;
  container.appendChild(bubble);
  row.appendChild(av);
  row.appendChild(container);
  inner.appendChild(row);
  chatView.scrollTop = chatView.scrollHeight;

  setMood('ripple');

  // Cycle thinking phrases ONLY while streaming
  thinkIdx = 0;
  let isCycling = true;
  thinkInterval = setInterval(() => {
    if (!isCycling) return;
    thinkIdx = (thinkIdx + 1) % thinkingPhrases.length;
    const summaries = inner.querySelectorAll('.vesper-thoughts summary');
    if (summaries.length) summaries[summaries.length - 1].textContent = thinkingPhrases[thinkIdx];
  }, 2800);

  let fullResponseText = '';
  const tagRegex = /\[~([a-z_]+)~\]/g;

  try {
    // Snapshot existing chat IDs before the request so we can detect the new one
    let existingChatIds = new Set();
    try {
      const snap = await fetch('/api/chats');
      const snapChats = await snap.json();
      snapChats.forEach(c => existingChatIds.add(c.id));
    } catch(e) {}

    const payload = { chat_id: currentChatId, message: text };
    if (editIndex !== null) payload.edit_index = editIndex;

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // Grab chat_id from response headers if new
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n').filter(l => l.trim());
      for (const line of lines) {
        if (line.includes('[DONE]')) break;
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            const delta = data.choices?.[0]?.delta?.content;
            if (delta) {
              fullResponseText += delta;
              const label = thinkingPhrases[thinkIdx];
              bubble.innerHTML = formatVesperHTML(fullResponseText, label);
              tagRegex.lastIndex = 0;
              let m;
              while ((m = tagRegex.exec(fullResponseText)) !== null) setMood(m[1]);
              if (chatView.scrollHeight - chatView.scrollTop < chatView.clientHeight + 120) {
                chatView.scrollTop = chatView.scrollHeight;
              }
            }
          } catch(e) {}
        }
      }
    }

    chatHistoryCache.push({ role: 'assistant', content: fullResponseText });

    // Refresh sidebar — find new chat if this was a fresh conversation
    await fetchChats();
    if (!currentChatId) {
      try {
        const res2 = await fetch('/api/chats');
        const allChats = await res2.json();
        const newChat = allChats.find(c => !existingChatIds.has(c.id));
        if (newChat) {
          currentChatId = newChat.id;
          currentChatTitle = newChat.title;
          document.getElementById('chatHeaderTitle').textContent = currentChatTitle;
        } else if (allChats.length > 0) {
          // fallback: take the first (most recent)
          currentChatId = allChats[0].id;
          currentChatTitle = allChats[0].title;
          document.getElementById('chatHeaderTitle').textContent = currentChatTitle;
        }
        updateSidebarActive();
        await fetchChats(); // re-render sidebar with active highlight
      } catch(e) {}
    }

  } catch(err) {
    console.error(err);
    bubble.innerHTML += `<div style="color:#ef4444;margin-top:10px;font-size:0.85em">⚠️ Connection interrupted</div>`;
    setMood('fade');
  } finally {
    isCycling = false;
    clearInterval(thinkInterval);
    bubble.innerHTML = formatVesperHTML(fullResponseText || '…', "Vesper's thoughts");
    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

fetchChats();
</script>
